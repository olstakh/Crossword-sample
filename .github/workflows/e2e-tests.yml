name: E2E Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build e2e test project
        run: dotnet build src/server.tests.end2end

      - name: Start application via Docker Compose
        run: docker compose up -d --build

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to start..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5000 | grep -q "200"; then
              echo "Application is ready!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 2s..."
            sleep 2
          done
          echo "Application failed to start"
          docker compose logs
          exit 1

      - name: Install Playwright browsers
        run: pwsh src/server.tests.end2end/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run end-to-end tests
        run: dotnet test --project src/server.tests.end2end --no-build

      - name: Stop Docker Compose
        if: always()
        run: docker compose down
